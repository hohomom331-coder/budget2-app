<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>월 예산 관리</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1f2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="예산관리" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1319;
      --surface: #1a2030;
      --surface2: #222a3a;
      --border: #2e3a50;
      --accent: #4f8ef7;
      --accent2: #f7c24f;
      --danger: #f76f6f;
      --success: #4fcf8e;
      --text: #e8edf5;
      --text2: #8a9ab8;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Nanum Gothic', sans-serif; overflow-x: hidden; }

    header {
      position: sticky; top: 0; z-index: 50;
      background: linear-gradient(180deg, #0f1319 80%, transparent);
      padding: 20px 20px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-family: 'Black Han Sans', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--accent2); }
    #reset-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text2); font-size: 12px; padding: 6px 12px;
      border-radius: 20px; cursor: pointer; font-family: inherit;
    }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; padding: 10px 0 20px; z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer; padding: 6px;
      color: var(--text2); font-family: inherit; font-size: 10px; transition: color .2s;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }

    .page { display: none; padding: 0 20px 100px; }
    .page.active { display: block; }

    .month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; }
    .month-nav button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    .month-nav span { font-weight: 800; font-size: 16px; }

    /* 총합 카드 */
    .total-card {
      background: var(--surface); border-radius: var(--radius); padding: 18px;
      border: 1px solid var(--border); margin-bottom: 14px;
      border-top: 3px solid var(--accent2);
    }
    .total-card .label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .total-card .big { font-size: 24px; font-weight: 800; color: var(--accent2); }
    .total-card .row { display: flex; justify-content: space-between; margin-top: 8px; font-size: 13px; }
    .total-card .row span:last-child { font-weight: 700; }

    /* 예산 항목 */
    .budget-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .budget-item {
      background: var(--surface); border-radius: var(--radius); padding: 14px 16px;
      border: 1px solid var(--border); position: relative; overflow: hidden;
    }
    .budget-item .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .budget-item .cat-name { font-size: 14px; font-weight: 700; }
    .budget-item .remain { font-size: 15px; font-weight: 800; }
    .budget-item .remain.low { color: var(--danger); }
    .budget-item .remain.ok { color: var(--success); }
    .budget-item .bar-bg { height: 5px; background: var(--bg); border-radius: 10px; overflow: hidden; }
    .budget-item .bar-fill { height: 100%; border-radius: 10px; transition: width .4s; }
    .budget-item .amounts { display: flex; justify-content: space-between; margin-top: 5px; font-size: 11px; color: var(--text2); }

    /* 지출 입력 */
    .add-section {
      background: var(--surface); border-radius: var(--radius); padding: 20px;
      border: 1px solid var(--border); margin-bottom: 20px;
    }
    .add-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--accent); }
    .form-row { margin-bottom: 12px; }
    .form-row label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; }
    .form-row select, .form-row input {
      width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 15px; padding: 12px 14px;
      border-radius: 10px; outline: none; transition: border-color .2s;
    }
    .form-row select:focus, .form-row input:focus { border-color: var(--accent); }

    /* 미리보기 */
    .preview-box {
      background: var(--surface2); border-radius: 10px; padding: 10px 14px;
      margin-bottom: 12px; font-size: 13px; color: var(--text2);
      border: 1px solid var(--border); min-height: 36px;
    }
    .preview-box strong { color: var(--accent2); font-size: 15px; }

    /* 빠른입력 버튼 */
    .quick-amounts { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .qa-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
      font-size: 12px; padding: 6px 10px; border-radius: 20px; cursor: pointer; font-family: inherit;
    }
    .qa-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .submit-btn {
      width: 100%; padding: 15px; background: var(--accent); color: #fff;
      border: none; border-radius: 12px; font-family: inherit; font-size: 16px;
      font-weight: 800; cursor: pointer; letter-spacing: 1px; transition: opacity .2s;
    }
    .submit-btn:active { opacity: 0.8; }

    /* 내역 */
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .history-header h3 { font-size: 14px; font-weight: 700; color: var(--text2); }
    .clear-btn { font-size: 12px; color: var(--danger); background: none; border: none; cursor: pointer; font-family: inherit; }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .hist-item {
      background: var(--surface); border-radius: 12px; padding: 12px 14px;
      border: 1px solid var(--border); display: flex; align-items: center; gap: 12px;
    }
    .hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .hist-info { flex: 1; }
    .hi-top { display: flex; justify-content: space-between; }
    .hi-cat { font-size: 12px; color: var(--text2); }
    .hi-memo { font-size: 14px; font-weight: 700; }
    .hi-amount { font-size: 15px; font-weight: 800; color: var(--danger); }
    .hi-date { font-size: 11px; color: var(--text2); }
    .hist-del { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 0 4px; }
    .empty-msg { text-align: center; color: var(--text2); padding: 40px 0; font-size: 14px; }

    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--success); color: #0f1319; padding: 10px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 700; opacity: 0; transition: all .3s; z-index: 200;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--danger); color: #fff; }
  </style>
</head>
<body>

<header>
  <h1>💰 예산관리</h1>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="month-label" style="font-size:12px;color:var(--text2)"></span>
    <button id="reset-btn" onclick="confirmReset()">초기화</button>
  </div>
</header>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="switchNav('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    홈
  </button>
  <button class="nav-btn" id="nav-add" onclick="switchNav('add')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    지출입력
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchNav('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    내역
  </button>
</nav>

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="home-month"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="total-card">
    <div class="label">📊 이번 달 전체 예산</div>
    <div class="big" id="total-budget-disp"></div>
    <div class="row"><span>총 사용</span><span id="total-spent-disp" style="color:var(--danger)"></span></div>
    <div class="row"><span>총 잔액</span><span id="total-remain-disp" style="color:var(--success)"></span></div>
  </div>
  <div class="budget-list" id="budget-list"></div>
</div>

<!-- ADD -->
<div class="page" id="page-add">
  <div class="add-section">
    <h3>✏️ 지출 입력</h3>
    <div class="form-row">
      <label>카테고리</label>
      <select id="cat-select" onchange="updatePreview()"></select>
    </div>
    <div class="form-row">
      <label>금액 (원 단위로 입력)</label>
      <input type="number" id="amount-input" placeholder="예: 280000" inputmode="numeric" oninput="updatePreview()" />
      <div class="quick-amounts">
        <button class="qa-btn" onclick="addAmount(10000)">+1만</button>
        <button class="qa-btn" onclick="addAmount(30000)">+3만</button>
        <button class="qa-btn" onclick="addAmount(50000)">+5만</button>
        <button class="qa-btn" onclick="addAmount(100000)">+10만</button>
        <button class="qa-btn" onclick="addAmount(200000)">+20만</button>
        <button class="qa-btn" onclick="addAmount(300000)">+30만</button>
        <button class="qa-btn" onclick="setAmount(0)">초기화</button>
      </div>
    </div>
    <div class="preview-box" id="preview-box">금액을 입력하면 미리보기가 표시됩니다</div>
    <div class="form-row">
      <label>메모 (선택)</label>
      <input type="text" id="memo-input" placeholder="예: 라온 수학, 마트, 외식..." />
    </div>
    <button class="submit-btn" onclick="addExpense()">+ 지출 등록</button>
  </div>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="hist-month"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="history-header">
    <h3 id="hist-count">내역</h3>
    <button class="clear-btn" onclick="clearHistory()">전체삭제</button>
  </div>
  <div class="history-list" id="history-list"></div>
</div>

<div id="toast"></div>

<script>
const BUDGETS = [
  { id: 'living',  name: '생활비',   budget: 1200000, color: '#4f8ef7' },
  { id: 'eating',  name: '외식비',   budget: 300000,  color: '#f7c24f' },
  { id: 'edu',     name: '교육비',   budget: 1500000, color: '#a78bfa' },
  { id: 'nh1',     name: '농협주영', budget: 300000,  color: '#4fcf8e' },
  { id: 'nh2',     name: '농협병주', budget: 300000,  color: '#f79e4f' },
  { id: 'sm1',     name: '새마을1',  budget: 300000,  color: '#f76f9e' },
  { id: 'sm2',     name: '새마을2',  budget: 100000,  color: '#6fbff7' },
  { id: 'hyundai', name: '현대',     budget: 500000,  color: '#f76f6f' },
];

const TOTAL_BUDGET = BUDGETS.reduce((s, b) => s + b.budget, 0);

function won(n) {
  if (n >= 10000) {
    const man = Math.floor(n / 10000);
    const rem = n % 10000;
    if (rem === 0) return `${man.toLocaleString()}만원`;
    return `${man.toLocaleString()}만 ${rem.toLocaleString()}원`;
  }
  return `${n.toLocaleString()}원`;
}

let currentMonth = getMonthKey(new Date());
let expenses = loadExpenses();

function getMonthKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function getMonthLabel(k) { const [y,m] = k.split('-'); return `${y}년 ${parseInt(m)}월`; }
function loadExpenses() { try { return JSON.parse(localStorage.getItem('budget_exp_v2') || '{}'); } catch { return {}; } }
function saveExpenses() { localStorage.setItem('budget_exp_v2', JSON.stringify(expenses)); }

function getSpent(month) {
  const list = expenses[month] || [];
  const map = {};
  BUDGETS.forEach(b => map[b.id] = 0);
  list.forEach(e => { if (map[e.cat] !== undefined) map[e.cat] += e.amount; });
  return map;
}

function renderHome() {
  const spent = getSpent(currentMonth);
  const totalSpent = Object.values(spent).reduce((s,v) => s+v, 0);
  const totalRemain = TOTAL_BUDGET - totalSpent;

  document.getElementById('total-budget-disp').textContent = won(TOTAL_BUDGET);
  document.getElementById('total-spent-disp').textContent = won(totalSpent);
  document.getElementById('total-remain-disp').textContent = won(totalRemain);
  document.getElementById('home-month').textContent = getMonthLabel(currentMonth);

  const list = document.getElementById('budget-list');
  list.innerHTML = '';
  BUDGETS.forEach(b => {
    const s = spent[b.id] || 0;
    const remain = b.budget - s;
    const pct = Math.min(100, (s / b.budget) * 100);
    const low = remain <= b.budget * 0.2;
    list.innerHTML += `
      <div class="budget-item" style="border-left:3px solid ${b.color}">
        <div class="top-row">
          <span class="cat-name">${b.name}</span>
          <span class="remain ${low?'low':'ok'}">${won(remain)}</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${b.color}"></div></div>
        <div class="amounts">
          <span>사용 ${won(s)}</span>
          <span>예산 ${won(b.budget)}</span>
        </div>
      </div>`;
  });
}

function renderHistory() {
  const list = expenses[currentMonth] || [];
  document.getElementById('hist-month').textContent = getMonthLabel(currentMonth);
  document.getElementById('hist-count').textContent = `총 ${list.length}건`;
  const el = document.getElementById('history-list');
  if (!list.length) { el.innerHTML = '<div class="empty-msg">📭 이 달의 내역이 없어요</div>'; return; }
  el.innerHTML = [...list].reverse().map((e, ri) => {
    const b = BUDGETS.find(x => x.id === e.cat);
    const realIdx = list.length - 1 - ri;
    return `
      <div class="hist-item">
        <div class="hist-dot" style="background:${b?.color||'#888'}"></div>
        <div class="hist-info">
          <div class="hi-top">
            <span class="hi-cat">${b?.name||e.cat}</span>
            <span class="hi-amount">-${won(e.amount)}</span>
          </div>
          <div class="hi-top" style="margin-top:2px">
            <span class="hi-memo">${e.memo||'(메모 없음)'}</span>
            <span class="hi-date">${e.date}</span>
          </div>
        </div>
        <button class="hist-del" onclick="deleteExpense(${realIdx})">×</button>
      </div>`;
  }).join('');
}

function updatePreview() {
  const catId = document.getElementById('cat-select').value;
  const amount = parseInt(document.getElementById('amount-input').value) || 0;
  const b = BUDGETS.find(x => x.id === catId);
  const box = document.getElementById('preview-box');

  if (!catId || !amount) {
    box.innerHTML = '금액을 입력하면 미리보기가 표시됩니다';
    return;
  }
  const spent = getSpent(currentMonth);
  const remain = b.budget - (spent[b.id] || 0);
  const afterRemain = remain - amount;

  if (afterRemain < 0) {
    box.innerHTML = `<span style="color:var(--danger)">⚠️ 잔액 초과! 현재 잔액: <strong>${won(remain)}</strong></span>`;
  } else {
    box.innerHTML = `${b.name} <strong>${won(amount)}</strong> 차감 → 잔액 <strong style="color:var(--success)">${won(afterRemain)}</strong>`;
  }
}

function addAmount(v) {
  const cur = parseInt(document.getElementById('amount-input').value) || 0;
  document.getElementById('amount-input').value = cur + v;
  updatePreview();
}
function setAmount(v) {
  document.getElementById('amount-input').value = v || '';
  updatePreview();
}

function addExpense() {
  const cat = document.getElementById('cat-select').value;
  const amount = parseInt(document.getElementById('amount-input').value);
  const memo = document.getElementById('memo-input').value.trim();

  if (!cat) { showToast('카테고리를 선택해주세요', true); return; }
  if (!amount || amount <= 0) { showToast('금액을 입력해주세요', true); return; }
  if (amount % 10 !== 0) { showToast('10원 단위로 입력해주세요', true); return; }

  const b = BUDGETS.find(x => x.id === cat);
  const spent = getSpent(currentMonth);
  const remain = b.budget - (spent[b.id] || 0);

  if (amount > remain) { showToast(`잔액 초과! 남은금액: ${won(remain)}`, true); return; }

  const now = new Date();
  const date = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  if (!expenses[currentMonth]) expenses[currentMonth] = [];
  expenses[currentMonth].push({ cat, amount, memo, date });
  saveExpenses();

  document.getElementById('amount-input').value = '';
  document.getElementById('memo-input').value = '';
  document.getElementById('preview-box').innerHTML = '금액을 입력하면 미리보기가 표시됩니다';
  showToast(`${b.name}에서 ${won(amount)} 차감 ✓`);
  renderHome(); renderHistory();
}

function deleteExpense(idx) {
  if (!expenses[currentMonth]) return;
  expenses[currentMonth].splice(idx, 1);
  saveExpenses(); renderHome(); renderHistory();
  showToast('삭제되었습니다');
}
function clearHistory() {
  if (!confirm('이 달의 내역을 모두 삭제할까요?')) return;
  expenses[currentMonth] = [];
  saveExpenses(); renderHome(); renderHistory();
}
function confirmReset() {
  if (!confirm('이 달의 모든 데이터를 초기화할까요?')) return;
  expenses[currentMonth] = [];
  saveExpenses(); renderHome(); renderHistory();
  showToast('초기화 완료');
}

function changeMonth(delta) {
  const [y,m] = currentMonth.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  currentMonth = getMonthKey(d);
  renderHome(); renderHistory();
  document.getElementById('month-label').textContent = getMonthLabel(currentMonth);
}

function switchNav(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page).classList.add('active');
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = isError ? 'show error' : 'show';
  setTimeout(() => t.className='', 2200);
}

function init() {
  const sel = document.getElementById('cat-select');
  sel.innerHTML = '<option value="">카테고리 선택</option>';
  BUDGETS.forEach(b => {
    sel.innerHTML += `<option value="${b.id}">${b.name} (예산 ${won(b.budget)})</option>`;
  });
  const label = getMonthLabel(currentMonth);
  document.getElementById('month-label').textContent = label;
  document.getElementById('home-month').textContent = label;
  document.getElementById('hist-month').textContent = label;
  renderHome(); renderHistory();
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
init();
</script>
</body>
</html>
